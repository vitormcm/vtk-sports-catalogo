<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTK Sports — Catálogo</title>
<meta name="description" content="Catálogo de camisas de futebol VTK Sports — confira o estoque disponível e chame no WhatsApp.">
<link rel="icon" type="image/png" href="logo.png">
<meta property="og:title" content="VTK Sports — Catálogo">
<meta property="og:description" content="Confira as camisas disponíveis em estoque e chame no WhatsApp.">
<meta property="og:image" content="https://vitormcm.github.io/vtk-sports-catalogo/logo.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://vitormcm.github.io/vtk-sports-catalogo/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="VTK Sports — Catálogo">
<meta name="twitter:description" content="Confira as camisas disponíveis em estoque e chame no WhatsApp.">
<meta name="twitter:image" content="https://vitormcm.github.io/vtk-sports-catalogo/logo.png">
<style>
  :root {
    --bg: #080a0b;
    --card-bg: #0e1211;
    --green: #35e08a;
    --green-bright: #5dffb0;
    --white: #f3f6f5;
    --muted: #7c8c87;
    --border: rgba(53,224,138,0.18);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(53,224,138,0.10), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(53,224,138,0.07), transparent 45%);
    color: var(--white);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow-x: hidden;
  }
  .hero {
    position: relative;
    padding: 70px 24px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    overflow: hidden;
  }
  .logo-ring {
    position: relative;
    width: 132px;
    height: 132px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--green);
    opacity: 0;
  }
  .logo-img {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 22px rgba(53,224,138,0.35));
  }
  .hero-title {
    font-size: clamp(1.8rem, 5vw, 2.7rem);
    font-weight: 800;
    letter-spacing: 1px;
    margin: 0;
    text-transform: uppercase;
  }
  .hero-title span { color: var(--green); }
  .hero-sub {
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
  }
  .hero-count {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--green-bright);
    border: 1px solid var(--border);
    background: rgba(53,224,138,0.06);
    padding: 6px 18px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }
  .updated-at {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .social-row { display: flex; gap: 10px; margin-top: 4px; }
  .social-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    text-decoration: none;
    color: var(--white);
    border: 1px solid var(--border);
    background: rgba(53,224,138,0.05);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.8rem;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
  }
  .social-btn:hover { border-color: var(--green); background: rgba(53,224,138,0.12); color: var(--green-bright); }
  .social-btn svg { width: 15px; height: 15px; }
  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.5;
  }
  .search-wrap {
    max-width: 420px;
    margin: 0 auto 4px;
    padding: 0 20px;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--white);
    font-size: 0.9rem;
    padding: 10px 16px;
    border-radius: 999px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--green); }
  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    display: none;
  }
  .cat-nav {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 20px;
    background: rgba(8,10,11,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .nav-pill {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    letter-spacing: 0.3px;
    border: 1px solid var(--border);
    padding: 7px 16px;
    border-radius: 999px;
    transition: all 0.2s ease;
    white-space: nowrap;
    cursor: pointer;
    background: none;
  }
  .nav-pill span { color: var(--green); margin-left: 4px; font-size: 0.75rem; }
  .nav-pill:hover { color: var(--white); border-color: var(--green); background: rgba(53,224,138,0.08); }
  .cat-section {
    max-width: 1440px;
    margin: 0 auto;
    padding: 46px 28px 10px;
  }
  .cat-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 22px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .cat-header h2 {
    font-size: 1.5rem;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
  }
  .cat-count { color: var(--muted); font-size: 0.85rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 22px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(30px);
    transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
  }
  .card:hover { border-color: var(--green); box-shadow: 0 10px 30px rgba(53,224,138,0.15); transform: translateY(-4px); }
  .card-img-wrap {
    position: relative;
    background: #14181a;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 10px; transition: transform 0.4s ease; }
  .card:hover .card-img-wrap img { transform: scale(1.06); }
  .stock-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 0.68rem;
    letter-spacing: 0.4px;
    color: var(--green-bright);
    background: rgba(8,10,11,0.75);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
  }
  .new-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 0.68rem;
    letter-spacing: 0.4px;
    color: #06110b;
    background: var(--green);
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .card-info {
    padding: 14px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .card-info h3 {
    font-size: 0.88rem;
    line-height: 1.35;
    margin: 0;
    font-weight: 600;
    color: var(--white);
    min-height: 2.6em;
  }
  .sizes-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .size-chip {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--green-bright);
    border: 1px solid var(--border);
    background: rgba(53,224,138,0.06);
    padding: 2px 8px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }
  .price-tag {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.2px;
  }
  .wa-btn {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    background: var(--green);
    color: #06110b;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 10px 12px;
    border-radius: 10px;
    letter-spacing: 0.2px;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .wa-btn:hover { background: var(--green-bright); transform: scale(1.03); }
  .wa-icon { width: 16px; height: 16px; flex-shrink: 0; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 50px 20px 30px;
    letter-spacing: 0.5px;
  }
  footer .footer-green { color: var(--green); }
  .footer-social { display: flex; justify-content: center; gap: 14px; margin-top: 16px; }
  .footer-social a {
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    font-size: 0.78rem;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 999px;
    transition: all 0.2s ease;
  }
  .footer-social a:hover { color: var(--green-bright); border-color: var(--green); }
  .footer-social svg { width: 14px; height: 14px; }
  .loading-msg { text-align: center; color: var(--muted); padding: 60px 20px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script>
  var WHATSAPP_NUMBER = "5561995082828";
  var SITE_BASE = "https://vitormcm.github.io/vtk-sports-catalogo/";

  function resolveImageUrl(src) {
    if (!src) return "";
    if (src.indexOf("http") === 0) return src;
    return SITE_BASE + src;
  }

  function fmtPrice(p) {
    if (p === null || p === undefined) return null;
    return "R$ " + p.toFixed(2).replace(".", ",");
  }

  function waLink(name, price, imageUrl) {
    var priceTxt = price ? " (" + fmtPrice(price) + ")" : "";
    var msg = "Olá! Tenho interesse na " + name + priceTxt + ". Podemos fechar?\n\nFoto: " + imageUrl;
    return "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(msg);
  }

  function slug(str) {
    return str.toLowerCase()
      .replace(/ã/g, "a").replace(/ç/g, "c").replace(/õ/g, "o").replace(/ô/g, "o").replace(/é/g, "e").replace(/á/g, "a")
      .replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  }

  var waIconSvg = '<svg viewBox="0 0 24 24" class="wa-icon" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2m0 1.67a8.2 8.2 0 0 1 5.83 2.42 8.16 8.16 0 0 1 2.41 5.82c0 4.55-3.7 8.25-8.25 8.25a8.3 8.3 0 0 1-4.2-1.15l-.3-.18-3.14.82.84-3.06-.2-.32a8.2 8.2 0 0 1-1.26-4.38c0-4.55 3.7-8.25 8.25-8.25M8.5 6.7c-.17 0-.44.06-.67.31s-.87.86-.87 2.08.9 2.4 1.02 2.57 1.77 2.83 4.35 3.86c2.14.86 2.58.69 3.04.65s1.5-.61 1.7-1.2.21-1.1.15-1.2-.24-.16-.5-.29-1.51-.75-1.75-.83-.4-.13-.58.13-.68.83-.83 1-.31.19-.57.06a7.2 7.2 0 0 1-2.13-1.31 8 8 0 0 1-1.48-1.84c-.15-.26-.02-.4.12-.53.12-.12.26-.31.4-.47.13-.15.17-.26.26-.44.09-.17.04-.33-.02-.46s-.58-1.42-.8-1.94-.42-.44-.58-.45-.34-.01-.5-.01z"/></svg>';

  function sizeChips(sizes) {
    if (!sizes || !sizes.length) return "";
    var order = ["P", "M", "G", "GG", "2GG", "3GG", "4GG", "XL", "2XL", "3XL"];
    var sorted = sizes.slice().sort(function (a, b) {
      var ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    var chips = "";
    for (var i = 0; i < sorted.length; i++) {
      chips += '<span class="size-chip">' + sorted[i] + "</span>";
    }
    return '<div class="sizes-row">' + chips + "</div>";
  }

  function cardHtml(it) {
    var stockLabel = it.stock ? it.stock + " em estoque" : "Em estoque";
    var newBadge = it.isNew ? '<span class="new-badge">Novidade</span>' : "";
    var priceHtml = it.price ? '<div class="price-tag">' + fmtPrice(it.price) + "</div>" : "";
    var fullImageUrl = resolveImageUrl(it.image);
    var html = "";
    html += '<div class="card" data-name="' + it.name.toLowerCase() + '">';
    html += '<div class="card-img-wrap">';
    html += '<img src="' + it.image + '" alt="' + it.name + '" loading="lazy">';
    html += '<span class="stock-badge">' + stockLabel + "</span>";
    html += newBadge;
    html += "</div>";
    html += '<div class="card-info">';
    html += "<h3>" + it.name + "</h3>";
    html += sizeChips(it.sizes);
    html += priceHtml;
    html += '<a class="wa-btn" href="' + waLink(it.name, it.price, fullImageUrl) + '" target="_blank" rel="noopener">';
    html += waIconSvg;
    html += "<span>Chamar no WhatsApp</span>";
    html += "</a>";
    html += "</div>";
    html += "</div>";
    return html;
  }

  function loadCatalog() {
    fetch("dados.json?t=" + Date.now())
      .then(function (res) { return res.json(); })
      .then(function (data) {
        document.getElementById("heroCount").textContent = data.totalStock + " modelos em estoque";
        if (data.generatedAt) {
          var d = new Date(data.generatedAt);
          document.getElementById("updatedAt").textContent = "Atualizado em " + d.toLocaleString("pt-BR");
        }

        var nav = document.getElementById("catNav");
        var content = document.getElementById("content");
        nav.innerHTML = "";
        content.innerHTML = "";

        for (var i = 0; i < data.categories.length; i++) {
          var cat = data.categories[i];
          var anchor = slug(cat.name);
          nav.innerHTML += '<a href="#' + anchor + '" class="nav-pill">' + cat.name + ' <span>' + cat.items.length + '</span></a>';

          var cardsHtml = "";
          for (var j = 0; j < cat.items.length; j++) {
            cardsHtml += cardHtml(cat.items[j]);
          }

          var section = document.createElement("section");
          section.className = "cat-section";
          section.id = anchor;
          section.innerHTML =
            '<div class="cat-header"><h2>' + cat.name + '</h2><span class="cat-count">' + cat.items.length + ' modelos</span></div>' +
            '<div class="grid">' + cardsHtml + '</div>';
          content.appendChild(section);
        }

        initAnimations();
        setupSearch();
      })
      .catch(function (err) {
        document.getElementById("content").innerHTML =
          '<div class="loading-msg">Não foi possível carregar o catálogo agora. Tente recarregar a página.</div>';
        console.error(err);
      });
  }

  function setupSearch() {
    var input = document.getElementById("searchInput");
    var noResults = document.getElementById("noResults");
    input.addEventListener("input", function () {
      var q = input.value.trim().toLowerCase();
      var anyVisible = false;
      var sections = document.querySelectorAll(".cat-section");
      for (var i = 0; i < sections.length; i++) {
        var section = sections[i];
        var sectionHasMatch = false;
        var cards = section.querySelectorAll(".card");
        for (var j = 0; j < cards.length; j++) {
          var card = cards[j];
          var match = !q || card.getAttribute("data-name").indexOf(q) !== -1;
          card.style.display = match ? "" : "none";
          if (match) sectionHasMatch = true;
        }
        section.style.display = sectionHasMatch ? "" : "none";
        if (sectionHasMatch) anyVisible = true;
      }
      noResults.style.display = anyVisible ? "none" : "block";
    });
  }

  function initAnimations() {
    gsap.registerPlugin(ScrollTrigger);

    gsap.timeline()
      .from(".logo-img", { scale: 0.4, opacity: 0, duration: 0.9, ease: "back.out(1.7)" })
      .from(".hero-title", { y: 20, opacity: 0, duration: 0.6, ease: "power2.out" }, "-=0.4")
      .from(".hero-sub", { y: 14, opacity: 0, duration: 0.5, ease: "power2.out" }, "-=0.3")
      .from(".hero-count", { y: 10, opacity: 0, duration: 0.5, ease: "power2.out" }, "-=0.3")
      .from(".social-btn", { y: 10, opacity: 0, duration: 0.5, ease: "power2.out" }, "-=0.2")
      .from(".nav-pill", { y: 10, opacity: 0, duration: 0.4, stagger: 0.06, ease: "power2.out" }, "-=0.2");

    anime({ targets: ".scanline", translateX: ["-100%", "100%"], opacity: [0, 0.7, 0], easing: "easeInOutSine", duration: 3200, loop: true, delay: anime.stagger(600) });
    anime({ targets: "#pulse1", scale: [1, 1.9], opacity: [0.6, 0], easing: "easeOutQuad", duration: 2200, loop: true });
    anime({ targets: "#pulse2", scale: [1, 1.9], opacity: [0.6, 0], easing: "easeOutQuad", duration: 2200, loop: true, delay: 1100 });

    gsap.utils.toArray(".cat-header").forEach(function (h) {
      gsap.from(h, { opacity: 0, x: -20, duration: 0.6, ease: "power2.out", scrollTrigger: { trigger: h, start: "top 88%", toggleActions: "play none none none" } });
    });
    gsap.utils.toArray(".card").forEach(function (card, i) {
      gsap.to(card, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out", delay: (i % 8) * 0.04, scrollTrigger: { trigger: card, start: "top 92%", toggleActions: "play none none none" } });
    });
    anime({ targets: ".wa-icon", scale: [1, 1.15, 1], duration: 1600, easing: "easeInOutSine", loop: true, delay: anime.stagger(80, { start: 800 }) });
  }

  loadCatalog();
</script>
</body>
</html>
